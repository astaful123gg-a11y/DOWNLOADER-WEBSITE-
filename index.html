<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>SHUVO Downloader</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="banner" class="banner hidden"></div>

<div class="topbar">
  <h1>⚡ SHUVO Downloader</h1>
</div>

<div class="container">
  <div class="input-row">
    <input type="text" id="urlInput" placeholder="Paste video/post link here...">
    <button id="pasteBtn">Paste</button>
  </div>
  <button id="downloadBtn" class="primary-btn">Get Download Link</button>

  <div id="status"></div>
  <div id="result"></div>

  <h3>Supported Platforms</h3>
  <div id="platformGrid" class="platform-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
